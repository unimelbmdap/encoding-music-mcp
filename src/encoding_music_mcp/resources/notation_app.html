<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>Notation Viewer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: transparent;
        }
        #app {
            min-height: 400px;
            border: 1px solid lightgray;
        }
        #loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
            font-family: system-ui, sans-serif;
            color: #666;
        }
    </style>
</head>
<body>
    <div id="loading">Loading notation viewer...</div>
    <div id="app" style="display: none;"></div>

    <script type="module">
        import { App } from "https://unpkg.com/@modelcontextprotocol/ext-apps@0.4.0/app-with-deps";
        import "https://editor.verovio.org/javascript/app/verovio-app.js";

        const loadingEl = document.getElementById("loading");
        const appEl = document.getElementById("app");

        let verovioApp = null;

        function initVerovio() {
            if (verovioApp) return;
            loadingEl.style.display = "none";
            appEl.style.display = "block";
            verovioApp = new Verovio.App(appEl, {
                defaultView: "responsive",
            });
        }

        const app = new App({ name: "Notation Viewer", version: "1.0.0" });

        app.ontoolresult = ({ content }) => {
            const textItem = content?.find(c => c.type === "text");
            if (!textItem) return;

            try {
                const data = JSON.parse(textItem.text);
                const xml = data.xml;
                if (xml) {
                    initVerovio();
                    verovioApp.loadData(xml);
                }
            } catch {
                // If content isn't JSON, try loading it as raw XML
                initVerovio();
                verovioApp.loadData(textItem.text);
            }
        };

        app.onerror = (err) => {
            console.error("MCP App error:", err);
            loadingEl.textContent = "Error loading notation";
        };

        await app.connect();
    </script>
</body>
</html>
